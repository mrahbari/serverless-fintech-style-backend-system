# In production: CloudWatch Logs + metric filters on structured JSON; X-Ray or OTel for traces.
spring:
  application:
    name: serverless-wallet

# Set wallet.aws.enabled=true and configure tables + IAM/DefaultCredentials for real DynamoDB + EventBridge.
wallet:
  aws:
    enabled: ${WALLET_AWS_ENABLED:false}
    region: ${AWS_REGION:eu-west-1}
    endpoint-override: ${AWS_ENDPOINT_OVERRIDE:}
    accounts-table: ${WALLET_ACCOUNTS_TABLE:wallet-accounts}
    idempotency-table: ${WALLET_IDEMPOTENCY_TABLE:wallet-transfer-idempotency}
    event-bus-name: ${WALLET_EVENT_BUS_NAME:default}
    event-source: wallet.wallet

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%thread] [%X{correlationId:-}] %logger{36} - %msg%n"
